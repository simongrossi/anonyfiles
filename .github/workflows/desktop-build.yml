name: Desktop build

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  desktop:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-14
            rust_target: aarch64-apple-darwin
          - os: macos-13
            rust_target: x86_64-apple-darwin
          - os: windows-latest
            rust_target: x86_64-pc-windows-msvc
          - os: ubuntu-latest
            rust_target: x86_64-unknown-linux-gnu

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Install Linux system deps (Tauri + WebKit)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libwebkit2gtk-4.1-dev \
            libssl-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libgtk-3-dev \
            build-essential \
            curl \
            wget \
            file

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust_target }}

      - name: Install Python deps + spaCy model
        shell: bash
        run: |
          python -m pip install --upgrade pip setuptools wheel
          python -m pip install -e ".[packaging]"
          python -m pip install "https://github.com/explosion/spacy-models/releases/download/fr_core_news_md-3.8.0/fr_core_news_md-3.8.0-py3-none-any.whl"

      - name: Build sidecar binary
        shell: bash
        run: python packaging/sidecar/build_sidecar.py --clean --triple ${{ matrix.rust_target }}

      - name: Install GUI deps
        working-directory: anonyfiles_gui
        run: npm ci

      - name: Tauri build
        working-directory: anonyfiles_gui
        run: npm run tauri build -- --target ${{ matrix.rust_target }}

      - name: Post-build re-sign (macOS)
        if: runner.os == 'macOS'
        run: |
          APP="anonyfiles_gui/src-tauri/target/${{ matrix.rust_target }}/release/bundle/macos/anonyfiles_gui.app"
          if [ -d "$APP" ]; then
            find "$APP" -name '.DS_Store' -delete
            codesign --force --deep --sign - "$APP"
            spctl --assess --type execute --verbose "$APP" || true
          fi

      - name: Upload artifacts (macOS)
        if: runner.os == 'macOS'
        uses: actions/upload-artifact@v4
        with:
          name: anonyfiles-${{ matrix.rust_target }}
          path: |
            anonyfiles_gui/src-tauri/target/${{ matrix.rust_target }}/release/bundle/macos/*.app
            anonyfiles_gui/src-tauri/target/${{ matrix.rust_target }}/release/bundle/dmg/*.dmg
          if-no-files-found: error

      - name: Upload artifacts (Windows)
        if: runner.os == 'Windows'
        uses: actions/upload-artifact@v4
        with:
          name: anonyfiles-${{ matrix.rust_target }}
          path: |
            anonyfiles_gui/src-tauri/target/${{ matrix.rust_target }}/release/bundle/msi/*.msi
            anonyfiles_gui/src-tauri/target/${{ matrix.rust_target }}/release/bundle/nsis/*.exe
          if-no-files-found: error

      - name: Upload artifacts (Linux)
        if: runner.os == 'Linux'
        uses: actions/upload-artifact@v4
        with:
          name: anonyfiles-${{ matrix.rust_target }}
          path: |
            anonyfiles_gui/src-tauri/target/${{ matrix.rust_target }}/release/bundle/appimage/*.AppImage
            anonyfiles_gui/src-tauri/target/${{ matrix.rust_target }}/release/bundle/deb/*.deb
          if-no-files-found: error
